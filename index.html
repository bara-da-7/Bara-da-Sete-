<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bará da Sete</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<link rel="icon" href="logo.png">

</head>

<body>

<!-- HERO -->
<header class="hero" id="hero">
    <div class="hero-bg"></div>

    <div class="hero-overlay"></div>

    <img src="logo.png" class="hero-logo">
    
    <div class="hero-buttons">
        <a href="https://wa.me/5554996169777" class="btn whatsapp">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
            WhatsApp
        </a>

        <a href="https://www.instagram.com/baradase7e" class="btn instagram">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
            Instagram
        </a>
    </div>
</header>

<!-- BUSCA -->
<div class="search-box">
    <input type="text" id="busca" placeholder="Buscar produto...">
</div>

<!-- CATEGORIAS -->
<div id="categorias"></div>

<!-- PRODUTOS -->
<div id="produtos"></div>

<!-- CARRINHO -->
<div id="carrinhoBtn">🛒 <span id="contador">0</span></div>

<div id="carrinho">
    <h2>Seu Carrinho</h2>
    <div id="itensCarrinho"></div>
    <h3 id="total"></h3>
    <button onclick="finalizar()">Finalizar Pedido</button>
</div>

<script src="script.js"></script>

</body>
</html>
