<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bará da Sete</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="hero">
  <h1>Bará da Sete</h1>
  <p>Artigos Religiosos</p>

  <div class="socials">
    <a href="https://wa.me/554996169777">WhatsApp</a>
    <a href="https://www.instagram.com/baradase7e">Instagram</a>
  </div>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Buscar produto..." oninput="filterProducts()">
</div>

<div id="skeleton" class="products">
  <div class="card-skeleton"></div>
  <div class="card-skeleton"></div>
</div>

<div id="products" class="products"></div>

<div class="cart-fab" onclick="toggleCart()">
  🛒 <span id="cart-count">0</span>
</div>

<div id="cart" class="cart">
  <h3>Seu Carrinho</h3>
  <div id="cart-items"></div>
  <p id="total"></p>
  <button onclick="goCheckout()">Finalizar Pedido</button>
</div>

<footer onclick="adminClick()">© Bará da Sete</footer>

<script src="cart.js"></script>
<script src="app.js"></script>

</body>
</html>
