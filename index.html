<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bará da Sete</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
</head>

<body>

<header class="topo">

  <div class="hero-logo-bg"></div>

  <div class="hero-content">
    <img src="logo.png" class="logo-topo">

    <h1>Bará da Sete</h1>
    <p>Artigos Religiosos</p>

    <div class="social">
      <a href="https://wa.me/5554996169777" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        WhatsApp
      </a>

      <a href="https://instagram.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
        Instagram
      </a>
    </div>
  </div>

</header>

<div class="search-box">
  <input id="busca" placeholder="Buscar produto...">
</div>

<div id="categorias"></div>
<div id="produtos"></div>

<div id="carrinhoBtn">🛒 <span id="contador">0</span></div>

<div id="carrinho">
  <h2>Seu Carrinho</h2>
  <div id="itensCarrinho"></div>
  <h3 id="total"></h3>

  <input id="nomeCliente" placeholder="Seu nome">
  <input id="endereco" placeholder="Endereço">

  <button onclick="checkout()">Finalizar Pedido</button>
</div>

<script src="api.js"></script>
<script src="cart.js"></script>
<script src="ui.js"></script>
<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
}
</script>

</body>
</html>
