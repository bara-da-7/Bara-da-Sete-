<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bará da Sete</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="hero">
    <img src="logo.png" class="logo" onclick="abrirAdmin()">
    <p class="slogan">Caminhos abertos, força e proteção</p>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="grid"></div>

<!-- CARRINHO -->
<div class="cart-float" onclick="abrirCarrinho()">
    🛒 <span id="contador">0</span>
</div>

<!-- MODAL CARRINHO -->
<div id="carrinhoModal" class="modal">
    <div class="modal-content">

        <h2>Seu Pedido</h2>

        <input id="cliente" placeholder="Seu nome">

        <select id="tipo">
            <option value="retirada">Retirada</option>
            <option value="entrega">Entrega</option>
        </select>

        <input id="cep" placeholder="CEP" style="display:none;">
        <input id="endereco" placeholder="Endereço" style="display:none;">

        <div id="itensCarrinho"></div>
        <h3 id="totalCarrinho"></h3>

        <button onclick="enviarPedido()">Finalizar</button>
    </div>
</div>

<!-- ADMIN -->
<div id="admin" class="admin">
    <h2>Painel Admin</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>

    <hr>

    <input id="nome" placeholder="Nome">
    <input id="preco" placeholder="Preço">
    <input id="estoque" placeholder="Estoque">
    <input id="categoria" placeholder="Categoria">

    <button onclick="sugerirCategoria()">Sugerir Categoria</button>

    <textarea id="desc" placeholder="Descrição"></textarea>

    <button onclick="gerarDescricao()">Gerar Descrição IA</button>

    <input type="file" id="img">

    <label>Promoção</label>
    <input type="checkbox" id="promo">

    <input id="precoPromo" placeholder="Preço Promo">

    <button onclick="salvarProduto()">Salvar Produto</button>

    <div id="adminLista"></div>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
