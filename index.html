<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bará da Sete</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="topo">
    <div class="logo" onclick="clickLogo()">Bará da Sete</div>
    <p class="slogan">Caminhos abertos, força e proteção</p>

    <input type="text" id="busca" placeholder="Pesquisar produtos...">
</div>

<div class="produtos" id="produtos"></div>

<div class="cart">
    <button onclick="finalizar()">Finalizar no WhatsApp</button>
</div>

<div class="admin" id="admin">
    <h2>Painel Admin</h2>

    <input id="nome" placeholder="Nome">
    <input id="preco" placeholder="Preço (ex: 10.50)">
    <input id="estoque" placeholder="Estoque">

    <label>Promoção?</label>
    <select id="promo">
        <option value="false">Não</option>
        <option value="true">Sim</option>
    </select>

    <input id="precoPromo" placeholder="Preço promoção">

    <textarea id="desc" placeholder="Descrição"></textarea>

    <input type="file" id="img">

    <button onclick="gerarDesc()">Gerar descrição</button>
    <button onclick="salvarProduto()">Salvar</button>

    <hr>

    <div id="listaAdmin"></div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
