<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bará da Sete</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<header class="header">
    <img src="logo.png" class="logo">
    <h1>Bará da Sete</h1>
    <p>Artigos Religiosos</p>
</header>

<input type="text" id="busca" placeholder="Buscar produto...">

<div id="filtros"></div>

<div id="produtos" class="produtos"></div>

<div class="cart-float">🛒 <span id="contador">0</span></div>

<!-- CARRINHO -->
<div id="carrinhoModal" class="modal">
<h2>🛒 Seu Pedido</h2>

<input id="cliente" placeholder="Seu nome">

<select id="tipo">
<option value="retirada">Retirada</option>
<option value="entrega">Entrega</option>
</select>

<input id="cep" placeholder="CEP">
<input id="endereco" placeholder="Endereço">

<div id="itensCarrinho"></div>

<h3 id="totalCarrinho"></h3>

<button onclick="enviarPedido()">Finalizar no WhatsApp</button>
<button onclick="fecharCarrinho()">Fechar</button>
</div>

<!-- ADMIN -->
<div id="admin" class="admin">

<h2>Painel Inteligente</h2>

<input id="nome" placeholder="Nome produto">
<input id="categoria" placeholder="Categoria">
<input id="preco" placeholder="Preço">
<input id="estoque" placeholder="Estoque">

<select id="promo">
<option value="false">Sem promoção</option>
<option value="true">Promoção</option>
</select>

<input id="precoPromo" placeholder="Preço promocional">

<textarea id="desc"></textarea>

<input type="file" id="img">

<button onclick="gerarDescricaoIA()">Gerar descrição IA</button>
<button onclick="salvarProduto()">Salvar</button>

<hr>
<div id="listaAdmin"></div>

<button onclick="fecharAdmin()">Fechar</button>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
