<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bará da Sete</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
</head>

<body>

<!-- TOPO -->
<header class="topo">
  <div class="bg"></div>

  <div class="conteudo">
    <img src="logo.png" class="logo">

    <h1>Bará da Sete</h1>
    <p>Artigos Religiosos</p>

    <div class="social">
      <a href="https://wa.me/5554996169777" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        WhatsApp
      </a>

      <a href="https://instagram.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
        Instagram
      </a>
    </div>
  </div>
</header>

<!-- BUSCA -->
<div class="search">
  <input id="busca" placeholder="Buscar produto...">
</div>

<!-- CATEGORIAS -->
<div id="categorias"></div>

<!-- PRODUTOS -->
<div id="produtos"></div>

<!-- BOTÃO CARRINHO -->
<div id="carrinhoBtn">🛒 <span id="contador">0</span></div>

<!-- CARRINHO -->
<div id="carrinho">
  <h2>Seu Carrinho</h2>

  <div id="itensCarrinho"></div>
  <h3 id="total"></h3>

  <input id="nomeCliente" placeholder="Seu nome">
  <input id="endereco" placeholder="Endereço">

  <button onclick="checkout()">Finalizar Pedido</button>
</div>

<script src="api.js"></script>
<script src="script.js"></script>

</body>
</html>
