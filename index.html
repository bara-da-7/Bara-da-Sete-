<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bará da Sete</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<header class="hero">
    <div class="logo" onclick="clickLogo()">Bará da Sete</div>
    <p class="slogan">Caminhos abertos, força e proteção</p>

    <div class="social">
        <a href="https://wa.me/5554996169777">WhatsApp</a>
        <a href="https://www.instagram.com/baradase7e">Instagram</a>
    </div>
</header>

<!-- PRODUTOS -->
<main class="products" id="products"></main>

<!-- CARRINHO -->
<div class="cart">
    <div id="total">Total: R$ 0</div>
    <button onclick="finalizar()">Finalizar no WhatsApp</button>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
    <h2>Painel Administrativo</h2>

    <input id="nome" placeholder="Nome do produto">
    <input id="preco" placeholder="Preço">
    <input id="estoque" placeholder="Estoque">

    <textarea id="desc" placeholder="Descrição"></textarea>

    <div class="upload-area" id="uploadArea">
        Arraste imagem aqui ou clique
        <input type="file" id="img">
    </div>

    <button onclick="gerarDesc()">Gerar descrição</button>
    <button onclick="salvarProduto()">Salvar produto</button>
</div>

<script src="script.js"></script>

</body>
</html>
