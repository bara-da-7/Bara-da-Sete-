<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bará da Sete</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO FULL -->
<header class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <img src="logo.png" class="logo">
  </div>
</header>

<!-- BUSCA -->
<div class="search">
  <input id="busca" placeholder="Buscar produto...">
</div>

<!-- CATEGORIAS -->
<div id="categorias"></div>

<!-- PRODUTOS -->
<div id="produtos"></div>

<!-- CARRINHO -->
<div id="carrinhoBtn">🛒 <span id="contador">0</span></div>

<div id="carrinho">
  <h2>Seu Carrinho</h2>
  <div id="itensCarrinho"></div>
  <h3 id="total"></h3>

  <input id="nomeCliente" placeholder="Seu nome">
  <input id="endereco" placeholder="Endereço">

  <button onclick="checkout()">Finalizar Pedido</button>
</div>

<!-- RODAPÉ -->
<footer class="rodape">

  <div class="social">
    <a href="https://wa.me/5554996169777" target="_blank">WhatsApp</a>
    <a href="https://instagram.com" target="_blank">Instagram</a>
  </div>

  <a class="mapa" target="_blank"
  href="https://maps.google.com?q=Av.%207%20de%20Setembro,%20462%20-%20Centro,%20Passo%20Fundo%20-%20RS,%2099010-121">
    📍 Ver localização
  </a>

</footer>

<script src="api.js"></script>
<script src="script.js"></script>

</body>
</html>
