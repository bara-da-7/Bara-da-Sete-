<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Bará da Sete</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link rel="stylesheet" href="style.css" />
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React
const CART_KEY = "bara-cart"

// ================= STORAGE =================
const loadCart = () => JSON.parse(localStorage.getItem(CART_KEY) || "{}")
const saveCart = (c) => localStorage.setItem(CART_KEY, JSON.stringify(c))

// ================= APP =================
function App(){

const [produtos,setProdutos]=useState([])
const [cart,setCart]=useState(loadCart())
const [open,setOpen]=useState(false)
const [busca,setBusca]=useState("")
const [categoria,setCategoria]=useState("Todos")

useEffect(()=>{
fetch("SUA_URL_SHEETS_AQUI")
.then(r=>r.json())
.then(setProdutos)
},[])

useEffect(()=>saveCart(cart),[cart])

// ================= FILTROS =================
const categorias=["Todos",...new Set(produtos.map(p=>p.categoria).filter(Boolean))]

const lista=produtos
.filter(p=>{
const ativo=p.ativo==="sim"||p.ativo===true
const okBusca=p.nome.toLowerCase().includes(busca.toLowerCase())
const okCat=categoria==="Todos"||p.categoria===categoria
return ativo&&okBusca&&okCat
})
.sort((a,b)=>a.nome.localeCompare(b.nome))

// ================= CART =================
function add(p){
setCart(prev=>{
const c={...prev}
if(!c[p.nome]) c[p.nome]={produto:p,qtd:1}
else c[p.nome].qtd++
return c
})
}

function decrease(nome){
setCart(prev=>{
const c={...prev}
if(!c[nome]) return c
c[nome].qtd<=1?delete c[nome]:c[nome].qtd--
return c
})
}

function remove(nome){
setCart(prev=>{
const c={...prev}
delete c[nome]
return c
})
}

const total=()=>Object.values(cart).reduce((s,i)=>s+Number(i.produto.preco)*i.qtd,0)
const totalQtd=()=>Object.values(cart).reduce((s,i)=>s+i.qtd,0)

// ================= FLY =================
function fly(e){
const r=e.target.getBoundingClientRect()
const d=document.querySelector(".float-cart").getBoundingClientRect()

const dot=document.createElement("div")
dot.className="fly-dot"
dot.style.left=r.left+"px"
dot.style.top=r.top+"px"
dot.style.setProperty("--tx",(d.left-r.left)+"px")
dot.style.setProperty("--ty",(d.top-r.top)+"px")

document.body.appendChild(dot)
setTimeout(()=>dot.remove(),600)
}

// ================= CHECKOUT =================
function finalizar(){
let msg="*Pedido Bará da Sete*%0A%0A"
Object.values(cart).forEach(i=>{
msg+=`• ${i.produto.nome} x${i.qtd}%0A`
})
msg+=`%0ATotal: R$ ${total().toFixed(2)}`
window.open(`https://wa.me/5599999999999?text=${msg}`)
}

// ================= UI =================
return(
<>

<header className="hero">
<div className="hero-bg"></div>
<div className="hero-inner">
<h1 className="store-title">Bará da Sete</h1>
<p className="store-sub">Produtos selecionados com qualidade</p>
</div>
</header>

<div className="sticky-bar">
<input
placeholder="Buscar produto..."
value={busca}
onChange={e=>setBusca(e.target.value)}
/>
</div>

<div className="categories-wrap">
<div className="categories">
{categorias.map(cat=>(
<button
key={cat}
className={`category-chip ${cat===categoria?"active":""}`}
onClick={()=>setCategoria(cat)}
>
{cat}
</button>
))}
</div>
</div>

<main className="main">
<div className="product-grid">

{lista.map(p=>{
const qtd=cart[p.nome]?.qtd||0

return(
<div className="product-card" key={p.nome}>

<div className="product-img-wrap">
<img src={p.imagem}/>
</div>

<div className="product-info">
<h3 className="product-name">{p.nome}</h3>

<span className="product-price">R$ {p.preco}</span>

{qtd===0?(
<button className="btn-add" onClick={(e)=>{add(p);fly(e)}}>
🛒 Adicionar
</button>
):(
<div className="qty-control">
<button className="qty-btn" onClick={()=>decrease(p.nome)}>−</button>
<span className="qty-value">{qtd}</span>
<button className="qty-btn" onClick={(e)=>{add(p);fly(e)}}>+</button>
</div>
)}

</div>
</div>
)
})}

</div>
</main>

<button className="float-cart" onClick={()=>setOpen(true)}>
🛒 {totalQtd()}
</button>

{open && <div className="cart-overlay open" onClick={()=>setOpen(false)}></div>}

<div className={`cart-sidebar ${open?"open":""}`}>

<div className="cart-header">
<strong>Seu Carrinho</strong>
<button onClick={()=>setOpen(false)}>✕</button>
</div>

<div className="cart-items">

{Object.keys(cart).length===0 && (
<div className="cart-empty">
<p>Seu carrinho está vazio</p>
</div>
)}

{Object.values(cart).map(({produto,qtd})=>(
<div className="cart-item" key={produto.nome}>

<div className="cart-item-info">
<p>{produto.nome}</p>
<p>R$ {produto.preco}</p>

<div className="cart-qty">
<button onClick={()=>decrease(produto.nome)}>−</button>
<span>{qtd}</span>
<button onClick={()=>add(produto)}>+</button>
</div>

<button className="btn-remove" onClick={()=>remove(produto.nome)}>
Remover
</button>
</div>

</div>
))}

</div>

{Object.keys(cart).length>0 && (
<div className="cart-footer">
<strong>Total: R$ {total().toFixed(2)}</strong>

<button className="btn-gold btn-full" onClick={finalizar}>
Finalizar Pedido 🚀
</button>
</div>
)}

</div>

</>
)
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>
</body>
</html>
