<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="container">

<h1>Painel Admin</h1>

<button class="novo" onclick="novoProduto()">+ Novo Produto</button>

<div id="lista"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-card">

    <h2 id="titulo">Produto</h2>

    <input id="f_nome" placeholder="Nome">
    <input id="f_preco" placeholder="Preço">
    <input id="f_categoria" placeholder="Categoria">
    <input id="f_estoque" placeholder="Estoque">
    <textarea id="f_descricao" placeholder="Descrição"></textarea>

    <label>
      <input type="checkbox" id="f_promocao"> Promoção
    </label>

    <input id="f_precoPromo" placeholder="Preço promocional">

    <div class="upload">
      <p id="status">Envie imagem</p>
      <div id="drop">Arraste ou clique</div>
      <input type="file" id="fileInput">
      <div id="preview"></div>
    </div>

    <div class="acoes">
      <button onclick="salvar()">Salvar</button>
      <button onclick="fechar()">Cancelar</button>
    </div>

  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
